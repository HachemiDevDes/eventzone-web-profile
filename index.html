<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventzone Profile</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #ffffff;
      color: #000000;
      padding-bottom: 100px; /* Space for fixed button */
      display: none; /* Hide until loaded */
    }
    
    .banner {
      width: 100%;
      height: 200px;
      background-image: url('https://images.unsplash.com/photo-1540575467063-178a50c2df87?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
    }
    
    .banner-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
    }
    
    .banner-text {
      color: white;
      font-size: 20px;
      font-weight: 900;
      background-color: #0047FF;
      padding: 4px 12px;
      line-height: 1.4;
      margin-bottom: 8px;
      text-transform: uppercase;
      display: inline-block;
    }
    
    .header-section {
      position: relative;
      padding: 0 24px;
      margin-top: -60px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      object-fit: cover;
      background-color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .logo-box {
      background-color: #0047FF;
      color: white;
      font-weight: 900;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 20px;
      margin-bottom: 20px;
    }
    
    .profile-info {
      padding: 24px;
    }
    
    .name {
      font-size: 32px;
      font-weight: 800;
      margin: 0;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    
    .job-title {
      font-size: 20px;
      color: #555;
      font-weight: 600;
      margin: 0;
      margin-bottom: 4px;
    }
    
    .company {
      font-size: 20px;
      color: #555;
      font-weight: 600;
      margin: 0;
      margin-bottom: 32px;
    }
    
    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .contact-item {
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
    }
    
    .icon-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: #3B82F6;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      flex-shrink: 0;
    }
    
    .contact-details {
      display: flex;
      flex-direction: column;
    }
    
    .contact-value {
      font-size: 16px;
      font-weight: 700;
      color: #111;
      margin-bottom: 2px;
    }
    
    .contact-label {
      font-size: 14px;
      color: #888;
    }
    
    .floating-btn-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(transparent, rgba(255,255,255,0.9) 20%, white);
      display: flex;
      justify-content: center;
      z-index: 100;
    }
    
    .save-btn {
      background-color: #3B82F6;
      color: white;
      text-decoration: none;
      padding: 18px 0;
      width: 100%;
      max-width: 320px;
      text-align: center;
      border-radius: 30px;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }
    
    .icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }
    
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 18px;
      font-weight: 600;
      color: #666;
    }
  </style>
</head>
<body>

  <div id="loading" class="loading">Loading profile...</div>

  <div id="profile-content">
    <div class="banner">
      <div class="banner-overlay">
        <span class="banner-text">CREATE MEMORABLE EXPERIENCES</span>
        <span class="banner-text">FOR YOUR ATTENDEES</span>
      </div>
    </div>
    
    <div class="header-section">
      <img id="profile-avatar" src="" alt="Avatar" class="avatar" />
      <div class="logo-box">eventzone</div>
    </div>
    
    <div class="profile-info">
      <h1 id="profile-name" class="name"></h1>
      <p id="profile-job" class="job-title"></p>
      <p id="profile-company" class="company"></p>
      
      <div id="contact-list" class="contact-list" style="margin-top: 32px;">
        <!-- Dynamic contact items -->
      </div>
    </div>

    <div class="floating-btn-container">
      <a href="https://eventzone.app/download" class="save-btn">Save Contact</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://zerkfiheipdigqtqjnjs.supabase.co';
    const ANON_KEY = 'sb_publishable_J1CFgtCFJGkKpdFqU6UFUg_fF7S_2Pc';

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        document.getElementById('loading').innerText = 'Invalid link: missing ID';
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${id}&select=*`, {
          headers: {
            'apikey': ANON_KEY,
            'Authorization': `Bearer ${ANON_KEY}`
          }
        });

        if (!response.ok) {
          throw new Error('Failed to fetch profile');
        }

        const data = await response.json();
        if (!data || data.length === 0) {
          document.getElementById('loading').innerText = 'Profile not found';
          return;
        }

        const profile = data[0];
        renderProfile(profile);
      } catch (error) {
        console.error(error);
        document.getElementById('loading').innerText = 'Error loading profile';
      }
    }

    function renderProfile(profile) {
      document.title = `${profile.full_name} - Eventzone`;
      document.getElementById('profile-name').innerText = profile.full_name;
      
      if (profile.job_title) {
        document.getElementById('profile-job').innerText = profile.job_title;
      } else {
        document.getElementById('profile-job').style.display = 'none';
      }
      
      if (profile.company_name) {
        document.getElementById('profile-company').innerText = profile.company_name;
      } else {
        document.getElementById('profile-company').style.display = 'none';
      }

      const avatarEl = document.getElementById('profile-avatar');
      avatarEl.src = profile.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.full_name)}&background=random`;

      const meta = profile.metadata || {};
      const contactList = document.getElementById('contact-list');
      
      if (meta.email) {
        contactList.appendChild(createContactItem(
          `mailto:${meta.email}`,
          meta.email,
          'Work',
          '<svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>'
        ));
      }

      if (meta.phone) {
        contactList.appendChild(createContactItem(
          `tel:${meta.phone}`,
          meta.phone,
          'Cell',
          '<svg class="icon" viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>'
        ));
      }

      if (meta.website) {
        const href = meta.website.startsWith('http') ? meta.website : `https://${meta.website}`;
        contactList.appendChild(createContactItem(
          href,
          'Eventzone Website',
          'Website',
          '<svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>',
          true
        ));
      }

      document.getElementById('loading').style.display = 'none';
      document.body.style.display = 'block';
    }

    function createContactItem(href, value, label, svgIcon, newTab = false) {
      const a = document.createElement('a');
      a.href = href;
      a.className = 'contact-item';
      if (newTab) {
        a.target = '_blank';
      }

      a.innerHTML = `
        <div class="icon-circle">
          ${svgIcon}
        </div>
        <div class="contact-details">
          <span class="contact-value">${value}</span>
          <span class="contact-label">${label}</span>
        </div>
      `;
      return a;
    }

    loadProfile();
  </script>
</body>
</html>
