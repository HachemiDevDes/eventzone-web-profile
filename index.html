<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Primary Meta Tags -->
  <title>My Digital Business Card</title>
  <meta name="title" content="My Digital Business Card">
  <meta name="description" content="View my professional profile, digital business card, and connect instantly on Eventzone.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="profile">
  <meta property="og:url" content="https://profile.eventzone.pro/">
  <meta property="og:title" content="My Digital Business Card">
  <meta property="og:description" content="View my professional profile, digital business card, and connect instantly on Eventzone.">
  <meta property="og:image" content="https://profile.eventzone.pro/app_icon.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://profile.eventzone.pro/">
  <meta property="twitter:title" content="My Digital Business Card">
  <meta property="twitter:description" content="View my professional profile, digital business card, and connect instantly on Eventzone.">
  <meta property="twitter:image" content="https://profile.eventzone.pro/app_icon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap');
    
    :root {
      --bg-color: #0c0f1a;
      --card-bg: rgba(255, 255, 255, 0.03);
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.54);
      --accent-blue: #1d7af2;
      --border-color: rgba(255, 255, 255, 0.05);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding-bottom: 100px; /* Space for fixed button */
    }
    
    #profile-content {
      display: none; /* Hide until loaded */
    }
    
    .banner {
      width: 100%;
      height: 400px;
      background-color: #1a1e29;
      background-size: cover;
      background-position: center;
      position: relative;
      /* Subtle fade at bottom to match app */
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
    }
    
    .profile-info {
      padding: 0 24px;
      margin-top: -60px; /* pull up slightly */
      position: relative;
      z-index: 10;
    }
    
    .name {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    
    .job-title {
      font-size: 14px;
      color: var(--text-sub);
      font-weight: 400;
      margin: 0;
      margin-bottom: 4px;
    }

    .company {
      font-size: 14px;
      color: var(--text-sub);
      font-weight: 400;
      margin: 0;
      margin-bottom: 24px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .scanned-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: rgba(29, 122, 242, 0.1);
      color: var(--accent-blue);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(29, 122, 242, 0.3);
      font-size: 12px;
      font-weight: 600;
    }
    
    .date-text {
      color: var(--text-sub);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .contact-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      text-decoration: none;
      color: inherit;
    }
    
    .icon-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: center;
      align-items: center;
      color: rgba(255, 255, 255, 0.5);
      flex-shrink: 0;
    }
    
    .contact-details {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .contact-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .contact-label {
      font-size: 12px;
      color: var(--text-sub);
      font-weight: 500;
    }

    .about-me-section {
      margin-bottom: 24px;
      display: none;
    }
    
    .about-me-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .collapsible-container {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    
    .collapsible-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      color: var(--text-main);
    }
    
    .collapsible-icon {
      width: 20px;
      height: 20px;
      fill: var(--text-sub);
      transition: transform 0.3s ease;
    }
    
    .collapsible-content {
      padding: 0 16px 16px 16px;
      display: none;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.5;
    }

    .collapsible-container.open .collapsible-content {
      display: block;
    }

    .collapsible-container.open .collapsible-icon {
      transform: rotate(180deg);
    }

    .chip-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    
    .chip.blue {
      background-color: rgba(29, 122, 242, 0.1);
      border: 1px solid rgba(29, 122, 242, 0.3);
      color: #1d7af2;
    }
    
    .chip.purple {
      background-color: rgba(224, 64, 251, 0.1);
      border: 1px solid rgba(224, 64, 251, 0.3);
      color: #e040fb;
    }
    
    .floating-btn-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(transparent, var(--bg-color) 20%, var(--bg-color));
      display: flex;
      justify-content: center;
      z-index: 100;
    }
    
    .save-btn {
      background-color: var(--accent-blue);
      color: white;
      text-decoration: none;
      padding: 16px 0;
      width: 100%;
      max-width: 320px;
      text-align: center;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
    }
    
    .icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
    
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-sub);
    }
  </style>
</head>
<body>

  <div id="loading" class="loading">Loading profile...</div>

  <div id="profile-content">
    <div class="banner" id="banner-bg">
    </div>
    
    <div class="profile-info">
      <h1 id="profile-name" class="name"></h1>
      <p id="profile-job" class="job-title"></p>
      <p id="profile-company" class="company"></p>
      
      
      <div id="about-me-section" class="about-me-section">
        <div class="about-me-title">About Me</div>
        <div id="about-me-content"></div>
      </div>
      
      <div id="contact-list" class="contact-list">
        <!-- Dynamic contact items -->
      </div>
    </div>

    <div class="floating-btn-container">
      <div id="save-btn" class="save-btn">Save Contact</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://awkreadldqmidcrrqukm.supabase.co';
    const ANON_KEY = 'sb_publishable_MluMrwkWs5-YedITa6ggNw_imK2nv8z';
    


    let profileId = null;

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      profileId = params.get('id');

      if (!profileId) {
        document.getElementById('loading').innerText = 'Invalid link: missing ID';
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${profileId}&select=*`, {
          headers: {
            'apikey': ANON_KEY,
            'Authorization': `Bearer ${ANON_KEY}`
          }
        });

        if (!response.ok) {
          throw new Error('Failed to fetch profile');
        }

        const data = await response.json();
        if (!data || data.length === 0) {
          document.getElementById('loading').innerText = 'Profile not found';
          return;
        }

        const profile = data[0];
        renderProfile(profile);
      } catch (error) {
        console.error(error);
        document.getElementById('loading').innerText = 'Error loading profile';
      }
    }

    function renderProfile(profile) {
      document.title = `${profile.full_name || 'Profile'} - Eventzone`;
      document.getElementById('profile-name').innerText = profile.full_name || '';
      
      if (profile.job_title) {
        document.getElementById('profile-job').innerText = profile.job_title;
      } else {
        document.getElementById('profile-job').style.display = 'none';
      }
      
      if (profile.company_name) {
        document.getElementById('profile-company').innerText = profile.company_name;
      } else {
        document.getElementById('profile-company').style.display = 'none';
      }

      if (profile.avatar_url) {
        document.getElementById('banner-bg').style.backgroundImage = `url('${profile.avatar_url}')`;
      }

      const meta = profile.metadata || {};
      const contactList = document.getElementById('contact-list');
      
      // About Me Section
      const aboutMeContent = document.getElementById('about-me-content');
      let hasAboutMe = false;

      if (profile.bio) {
        hasAboutMe = true;
        aboutMeContent.appendChild(createCollapsible('Professional Bio', escapeHtml(profile.bio).replace(/\n/g, '<br>')));
      }
      
      if (profile.what_im_looking_for) {
        const items = profile.what_im_looking_for.split(',').map(s => s.trim()).filter(s => s);
        if (items.length > 0) {
          hasAboutMe = true;
          aboutMeContent.appendChild(createCollapsibleChips("What I'm Looking For", items, 'blue'));
        }
      }
      
      let tags = [];
      if (profile.industries) tags = tags.concat(profile.industries);
      if (profile.interests) tags = tags.concat(profile.interests);
      tags = [...new Set(tags)];
      
      if (tags.length > 0) {
        hasAboutMe = true;
        aboutMeContent.appendChild(createCollapsibleChips("Industries & Interests", tags, 'purple'));
      }
      
      if (hasAboutMe) {
        document.getElementById('about-me-section').style.display = 'block';
      }
      
      // Gather contact info
      const email = profile.email || meta.email;
      const phone = profile.phone || meta.phone;
      const website = profile.website || meta.website;
      const address = profile.address || meta.address;
      
      let socialLinks = [];
      if (meta.socials) {
        socialLinks = parseSocialLinks(meta.socials);
      } else if (profile.social_links) {
        socialLinks = parseSocialLinks(profile.social_links);
      }

      const hasContactInfo = email || phone || website || address || socialLinks.length > 0;
      if (hasContactInfo) {
        const titleDiv = document.createElement('div');
        titleDiv.className = 'about-me-title';
        titleDiv.innerText = 'Social Links';
        contactList.parentNode.insertBefore(titleDiv, contactList);
      }
      
      // Email
      if (email) {
        contactList.appendChild(createContactItem(
          `mailto:${email}`,
          email,
          'Work',
          '<path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>'
        ));
      }

      // Phone
      if (phone) {
        contactList.appendChild(createContactItem(
          `tel:${phone}`,
          phone,
          'Cell',
          '<path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>'
        ));
      }

      // Website
      if (website) {
        const href = website.startsWith('http') ? website : `https://${website}`;
        contactList.appendChild(createContactItem(
          href,
          website,
          'Website',
          '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>',
          true
        ));
      }

      // Address
      if (address) {
        const href = `https://maps.google.com/?q=${encodeURIComponent(address)}`;
        contactList.appendChild(createContactItem(
          href,
          address,
          'Address',
          '<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>',
          true
        ));
      }

      socialLinks.forEach(link => {
        if (!link.value || !link.platform) return;
        
        let displayPlatform = link.platform.charAt(0).toUpperCase() + link.platform.slice(1);
        let val = link.value.trim();
        let lowerPlatform = link.platform.toLowerCase().trim();
        let href = val;

        switch (lowerPlatform) {
          case 'email': case 'work': case 'mail':
            href = `mailto:${val}`;
            break;
          case 'phone': case 'mobile': case 'cell':
            href = `tel:${val}`;
            break;
          case 'whatsapp':
            const digits = val.replace(/\D/g, '');
            href = `https://wa.me/${digits}`;
            break;
          case 'linkedin':
            if (!val.includes('linkedin.com')) href = `https://linkedin.com/in/${val}`;
            else if (!val.startsWith('http')) href = `https://${val}`;
            break;
          case 'github':
            if (!val.includes('github.com')) href = `https://github.com/${val}`;
            else if (!val.startsWith('http')) href = `https://${val}`;
            break;
          case 'twitter': case 'x':
            if (!val.includes('x.com') && !val.includes('twitter.com')) href = `https://x.com/${val}`;
            else if (!val.startsWith('http')) href = `https://${val}`;
            break;
          case 'instagram':
            if (!val.includes('instagram.com')) href = `https://instagram.com/${val}`;
            else if (!val.startsWith('http')) href = `https://${val}`;
            break;
          case 'facebook':
            if (!val.includes('facebook.com')) href = `https://facebook.com/${val}`;
            else if (!val.startsWith('http')) href = `https://${val}`;
            break;
          case 'telegram':
            const tUser = val.startsWith('@') ? val.substring(1) : val;
            href = `https://t.me/${tUser}`;
            break;
          case 'youtube':
            if (!val.includes('youtube.com') && !val.includes('youtu.be')) href = `https://youtube.com/${val}`;
            else if (!val.startsWith('http')) href = `https://${val}`;
            break;
          case 'tiktok':
            if (!val.includes('tiktok.com')) {
              const u = val.startsWith('@') ? val : `@${val}`;
              href = `https://tiktok.com/${u}`;
            }
            else if (!val.startsWith('http')) href = `https://${val}`;
            break;
          case 'behance':
            if (!val.includes('behance.net')) href = `https://behance.net/${val}`;
            else if (!val.startsWith('http')) href = `https://${val}`;
            break;
          case 'dribbble':
            if (!val.includes('dribbble.com')) href = `https://dribbble.com/${val}`;
            else if (!val.startsWith('http')) href = `https://${val}`;
            break;
          default:
            if (!val.startsWith('http')) href = `https://${val}`;
            break;
        }
        
        contactList.appendChild(createContactItem(
          href,
          link.value,
          displayPlatform,
          getPlatformIconPath(link.platform),
          true
        ));
      });

      document.getElementById('loading').style.display = 'none';
      document.getElementById('profile-content').style.display = 'block';
    }

    function parseSocialLinks(raw) {
      if (!raw) return [];
      if (Array.isArray(raw)) {
        return raw;
      }
      if (typeof raw === 'object') {
        return Object.entries(raw).map(([key, value]) => ({
          platform: key,
          value: value,
          label: value
        }));
      }
      return [];
    }

    function getPlatformIconPath(platform) {
      const p = platform.toLowerCase();
      // Using generic link icon as fallback for all platforms (matches LucideIcons.link)
      let path = '<path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>';
      
      if (p === 'linkedin') {
         path = '<path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94V10.13H5.5v8.37h2.77z"/>';
      } else if (p === 'instagram') {
         path = '<path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6m9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25M12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5m0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/>';
      } else if (p === 'twitter' || p === 'x') {
         path = '<path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5 5 9.2 5 9.2s1.5.8 2.8.8c-3.1-2-3.2-8.4-1-11 2.8 3.5 6.9 5.5 11.2 6 0 0-2.2-6.5 4-6.5 1.7 0 3.2.7 4 2 1.3-.3 2.5-1 2.5-1z"/>';
      } else if (p === 'facebook') {
         path = '<path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>';
      }
      return path;
    }

    function createContactItem(href, value, label, svgPath, newTab = false) {
      const a = document.createElement('a');
      a.href = href;
      a.className = 'contact-card';
      if (newTab) {
        a.target = '_blank';
      }

      a.innerHTML = `
        <div class="icon-circle">
          <svg class="icon" viewBox="0 0 24 24">${svgPath}</svg>
        </div>
        <div class="contact-details">
          <span class="contact-value">${value}</span>
          <span class="contact-label">${label}</span>
        </div>
      `;
      return a;
    }

    // Deferred deep linking logic
    document.getElementById('save-btn').addEventListener('click', async () => {
      if (!profileId) return;
      
      const appSchemeUrl = `eventzone://profile?id=${profileId}`;
      const playStoreUrl = `https://play.google.com/store/apps/details?id=com.example.eventzone_app&referrer=profile_${profileId}`;
      const appStoreUrl = `https://apps.apple.com/app/idYOUR_APP_ID`; // To be replaced

      // Fallback logic for iOS deferred linking: copy to clipboard
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS) {
        try {
          await navigator.clipboard.writeText(`eventzone_profile_${profileId}`);
        } catch (e) {
          console.error("Clipboard copy failed", e);
        }
      }

      // Try App Scheme First
      window.location.href = appSchemeUrl;

      // Fallback to Store after a short delay
      setTimeout(() => {
        if (isIOS) {
          window.location.href = appStoreUrl;
        } else {
          window.location.href = playStoreUrl;
        }
      }, 2500);
    });

    function escapeHtml(unsafe) {
      return (unsafe || "").toString()
         .replace(/&/g, "&amp;")
         .replace(/</g, "&lt;")
         .replace(/>/g, "&gt;")
         .replace(/"/g, "&quot;")
         .replace(/'/g, "&#039;");
    }

    function createCollapsible(title, contentHTML) {
      const container = document.createElement('div');
      container.className = 'collapsible-container';
      container.innerHTML = `
        <div class="collapsible-header" onclick="this.parentElement.classList.toggle('open')">
          <span>${title}</span>
          <svg class="collapsible-icon" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        </div>
        <div class="collapsible-content">
          ${contentHTML}
        </div>
      `;
      return container;
    }
    
    function createCollapsibleChips(title, items, colorClass) {
      const chipsHTML = `<div class="chip-container">
        ${items.map(item => `<div class="chip ${colorClass}">${escapeHtml(item)}</div>`).join('')}
      </div>`;
      return createCollapsible(title, chipsHTML);
    }

    // Start loading profile data immediately
    loadProfile();
  </script>
</body>
