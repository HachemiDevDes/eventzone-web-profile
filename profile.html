<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventzone Profile</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    
    :root {
      --bg-color: #0b0d12;
      --card-bg: #11141b;
      --text-main: #ffffff;
      --text-sub: #888c94;
      --accent-blue: #1d7af2;
      --border-color: #1e222d;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding-bottom: 100px; /* Space for fixed button */
    }
    
    #profile-content {
      display: none; /* Hide until loaded */
    }
    
    .banner {
      width: 100%;
      height: 350px;
      background-image: url('https://images.unsplash.com/photo-1540575467063-178a50c2df87?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
      background-size: cover;
      background-position: center;
      position: relative;
      /* subtle fade at bottom */
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
    }
    
    .profile-info {
      padding: 0 24px;
      margin-top: -40px; /* pull up slightly */
      position: relative;
      z-index: 10;
    }
    
    .name {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
      margin-bottom: 8px;
    }
    
    .job-title, .company {
      font-size: 16px;
      color: var(--text-sub);
      font-weight: 500;
      margin: 0;
      margin-bottom: 4px;
    }
    
    .company {
      margin-bottom: 24px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .scanned-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: rgba(29, 122, 242, 0.1);
      color: var(--accent-blue);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid rgba(29, 122, 242, 0.3);
      font-size: 13px;
      font-weight: 600;
    }
    
    .date-text {
      color: var(--text-sub);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tag-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: var(--accent-blue);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 24px;
      cursor: pointer;
    }
    
    .message-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      width: 100%;
      background-color: var(--accent-blue);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 24px;
      cursor: pointer;
    }
    
    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .contact-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      text-decoration: none;
      color: inherit;
    }
    
    .icon-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background-color: #1e222d;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-sub);
      flex-shrink: 0;
    }
    
    .contact-details {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .contact-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .contact-label {
      font-size: 13px;
      color: var(--text-sub);
      font-weight: 500;
    }
    
    .floating-btn-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(transparent, var(--bg-color) 20%, var(--bg-color));
      display: flex;
      justify-content: center;
      z-index: 100;
    }
    
    .save-btn {
      background-color: var(--accent-blue);
      color: white;
      text-decoration: none;
      padding: 18px 0;
      width: 100%;
      max-width: 320px;
      text-align: center;
      border-radius: 30px;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 4px 15px rgba(29, 122, 242, 0.4);
      cursor: pointer;
    }
    
    .icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-sub);
    }
  </style>
</head>
<body>

  <div id="loading" class="loading">Loading profile...</div>

  <div id="profile-content">
    <div class="banner" id="banner-bg">
    </div>
    
    <div class="profile-info">
      <h1 id="profile-name" class="name"></h1>
      <p id="profile-job" class="job-title"></p>
      <p id="profile-company" class="company"></p>
      
      <div class="meta-row">
        <div class="scanned-badge">
          <svg class="icon" style="width: 16px; height: 16px;" viewBox="0 0 24 24"><path d="M4 4h6v6H4V4zm2 2v2h2V6H6zm-2 8h6v6H4v-6zm2 2v2h2v-2H6zm8-12h6v6h-6V4zm2 2v2h2V6h-2zm-2 8h2v2h-2v-2zm4 0h2v2h-2v-2zm-2 2h2v2h-2v-2zm2 2h2v2h-2v-2zm-4 0h2v2h-2v-2zm2-2h2v2h-2v-2z" fill="currentColor"/></svg>
          Profile Link
        </div>
        <div class="date-text">
          <svg class="icon" style="width: 16px; height: 16px;" viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 002 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z" fill="currentColor"/></svg>
          <span id="current-date"></span>
        </div>
      </div>

      <button class="tag-btn">
        <svg class="icon" style="width: 16px; height: 16px;" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="currentColor"/></svg>
        Add tag
      </button>

      <button class="message-btn">
        <svg class="icon" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z" fill="currentColor"/></svg>
        Message
      </button>
      
      <div id="contact-list" class="contact-list">
        <!-- Dynamic contact items -->
      </div>
    </div>

    <div class="floating-btn-container">
      <div id="save-btn" class="save-btn">Save Contact</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://awkreadldqmidcrrqukm.supabase.co';
    const ANON_KEY = 'sb_publishable_MluMrwkWs5-YedITa6ggNw_imK2nv8z';
    
    // Set current date
    const dateOptions = { day: '2-digit', month: 'long', year: 'numeric' };
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-GB', dateOptions);

    let profileId = null;

    async function loadProfile() {
      const params = new URLSearchParams(window.location.search);
      profileId = params.get('id');

      if (!profileId) {
        document.getElementById('loading').innerText = 'Invalid link: missing ID';
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${profileId}&select=*`, {
          headers: {
            'apikey': ANON_KEY,
            'Authorization': `Bearer ${ANON_KEY}`
          }
        });

        if (!response.ok) {
          throw new Error('Failed to fetch profile');
        }

        const data = await response.json();
        if (!data || data.length === 0) {
          document.getElementById('loading').innerText = 'Profile not found';
          return;
        }

        const profile = data[0];
        renderProfile(profile);
      } catch (error) {
        console.error(error);
        document.getElementById('loading').innerText = 'Error loading profile';
      }
    }

    function renderProfile(profile) {
      document.title = `${profile.full_name} - Eventzone`;
      document.getElementById('profile-name').innerText = profile.full_name;
      
      if (profile.job_title) {
        document.getElementById('profile-job').innerText = profile.job_title;
      } else {
        document.getElementById('profile-job').style.display = 'none';
      }
      
      if (profile.company_name) {
        document.getElementById('profile-company').innerText = profile.company_name;
      } else {
        document.getElementById('profile-company').style.display = 'none';
      }

      if (profile.avatar_url) {
        document.getElementById('banner-bg').style.backgroundImage = `url('${profile.avatar_url}')`;
      }

      const meta = profile.metadata || {};
      const contactList = document.getElementById('contact-list');
      
      if (meta.email) {
        contactList.appendChild(createContactItem(
          `mailto:${meta.email}`,
          meta.email,
          'Work',
          '<path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>'
        ));
      }

      if (meta.phone) {
        contactList.appendChild(createContactItem(
          `tel:${meta.phone}`,
          meta.phone,
          'Cell',
          '<path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/>'
        ));
      }

      if (meta.website) {
        const href = meta.website.startsWith('http') ? meta.website : `https://${meta.website}`;
        contactList.appendChild(createContactItem(
          href,
          meta.website,
          'Website',
          '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>',
          true
        ));
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('profile-content').style.display = 'block';
    }

    function createContactItem(href, value, label, svgPath, newTab = false) {
      const a = document.createElement('a');
      a.href = href;
      a.className = 'contact-card';
      if (newTab) {
        a.target = '_blank';
      }

      a.innerHTML = `
        <div class="icon-circle">
          <svg class="icon" viewBox="0 0 24 24">${svgPath}</svg>
        </div>
        <div class="contact-details">
          <span class="contact-value">${value}</span>
          <span class="contact-label">${label}</span>
        </div>
      `;
      return a;
    }

    // Deferred deep linking logic
    document.getElementById('save-btn').addEventListener('click', async () => {
      if (!profileId) return;
      
      const appSchemeUrl = `eventzone://profile?id=${profileId}`;
      const playStoreUrl = `https://play.google.com/store/apps/details?id=com.example.eventzone_app&referrer=profile_${profileId}`;
      const appStoreUrl = `https://apps.apple.com/app/idYOUR_APP_ID`; // To be replaced

      // Fallback logic for iOS deferred linking: copy to clipboard
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS) {
        try {
          await navigator.clipboard.writeText(`eventzone_profile_${profileId}`);
        } catch (e) {
          console.log("Clipboard write failed", e);
        }
      }

      // Try to open the app directly first
      window.location.href = appSchemeUrl;

      // Fallback to store after a short timeout
      setTimeout(() => {
        if (isIOS) {
          window.location.href = appStoreUrl;
        } else {
          window.location.href = playStoreUrl;
        }
      }, 1500);
    });

    loadProfile();
  </script>
</body>
</html>
